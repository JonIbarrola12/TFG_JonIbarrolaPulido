<div class="auth-container">

  <div class="auth-card">
    <h2>Iniciar sesión</h2>

    @if (errorMessage) {
     <div class="error">
      {{ errorMessage }}
    </div>
    }

    <form (ngSubmit)="iniciarSesion()">

      <div class="form-group">
        <label>Correo</label>
        <input type="email"
               [(ngModel)]="correo"
               name="correo"
               placeholder="ejemplo@email.com"
               required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password"
               [(ngModel)]="contrasena"
               name="contrasena"
               placeholder="********"
               required>
      </div>

      <button type="submit" class="btn-primary">
        {{ cargando ? 'Entrando...' : 'Entrar' }}
      </button>

    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/register">Regístrate</a>
    </p>

  </div>

</div>
